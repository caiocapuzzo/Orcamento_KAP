name: Build Linux AppImage

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          qt6-base-dev \
          qt6-tools-dev-tools \
          cmake \
          wget \
          file \
          libxcb-cursor0

    - name: Build project
      run: |
        mkdir build
        cd build
        cmake ..
        make -j$(nproc)

    - name: Download linuxdeploy + plugin Qt
      run: |
        wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        wget https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage

        chmod +x linuxdeploy-x86_64.AppImage
        chmod +x linuxdeploy-plugin-qt-x86_64.AppImage

    - name: Prepare AppDir
      run: |
        mkdir -p AppDir/usr/bin
        cp build/orcamentoweb AppDir/usr/bin/

    - name: Create desktop file
      run: |
        cat <<EOF > AppDir/orcamentoweb.desktop
        [Desktop Entry]
        Name=OrcamentoWeb
        Exec=orcamentoweb
        Icon=orcamentoweb
        Type=Application
        Categories=Utility;
        EOF

    - name: Create icon (dummy)
      run: |
        mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
        touch AppDir/usr/share/icons/hicolor/256x256/apps/orcamentoweb.png

    - name: Build AppImage
      run: |
        export PATH=$PWD:$PATH

        ./linuxdeploy-x86_64.AppImage \
          --appdir AppDir \
          --executable AppDir/usr/bin/orcamentoweb \
          --desktop-file AppDir/orcamentoweb.desktop \
          --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/orcamentoweb.png \
          --plugin qt \
          --output appimage

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: OrcamentoWeb-AppImage
        path: ./*.AppImage